name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to deploy (e.g., 0.1.0)'
        required: true
      force_rebuild:
        description: 'Rebuild all images regardless of changes'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  ACR_NAME: crnotebookmdprod
  RESOURCE_GROUP: rg-notebookmd-prod

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      api-changed: ${{ steps.changes.outputs.api }}
      web-changed: ${{ steps.changes.outputs.web }}
      admin-changed: ${{ steps.changes.outputs.admin }}
      any-changed: ${{ steps.changes.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.tag) || '' }}

      - name: Extract version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE="${{ inputs.tag }}"
          else
            BASE="${GITHUB_REF_NAME#v}"
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "version=${BASE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "base_version=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Detect changes since previous tag
        id: changes
        run: |
          FORCE="${{ inputs.force_rebuild }}"
          CURRENT_TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT_TAG="v${{ inputs.tag }}"
          fi

          # Find previous version tag (skip current)
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ] || [ "$FORCE" = "true" ]; then
            echo "Building all images (first deploy or force rebuild)"
            for key in api web admin any; do echo "$key=true" >> "$GITHUB_OUTPUT"; done
            exit 0
          fi

          echo "Comparing $PREV_TAG → $CURRENT_TAG"
          CHANGED=$(git diff --name-only "$PREV_TAG" "$CURRENT_TAG" || echo "")
          echo "$CHANGED"

          # Shared dependency changes force all rebuilds
          SHARED=false
          if echo "$CHANGED" | grep -qE "^(packages/shared/|package-lock\.json$|package\.json$)"; then
            SHARED=true
          fi

          API=false
          if [ "$SHARED" = "true" ]; then
            API=true
          elif echo "$CHANGED" | grep -qE "^(apps/api/|docker/Dockerfile\.api$)"; then
            API=true
          fi

          WEB=false
          if [ "$SHARED" = "true" ]; then
            WEB=true
          elif echo "$CHANGED" | grep -qE "^(apps/web/|docker/Dockerfile\.web$|docker/nginx/)"; then
            WEB=true
          fi

          ADMIN=false
          if [ "$SHARED" = "true" ]; then
            ADMIN=true
          elif echo "$CHANGED" | grep -qE "^(apps/admin/|docker/Dockerfile\.admin$|docker/nginx/)"; then
            ADMIN=true
          fi

          ANY=false
          if [ "$API" = "true" ] || [ "$WEB" = "true" ] || [ "$ADMIN" = "true" ]; then
            ANY=true
          fi

          echo "api=$API" >> "$GITHUB_OUTPUT"
          echo "web=$WEB" >> "$GITHUB_OUTPUT"
          echo "admin=$ADMIN" >> "$GITHUB_OUTPUT"
          echo "any=$ANY" >> "$GITHUB_OUTPUT"
          echo "### Change Detection" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Changed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API | $API |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web | $WEB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Admin | $ADMIN |" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify CI passed
        if: steps.changes.outputs.any == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Checking CI for $COMMIT_SHA..."

          # Check for completed CI run
          CI_RESULT=$(gh run list \
            --workflow=ci.yml \
            --commit="$COMMIT_SHA" \
            --status=completed \
            --json conclusion \
            --jq '.[0].conclusion' 2>/dev/null || echo "")

          if [ "$CI_RESULT" = "success" ]; then
            echo "✅ Build & Test passed"
            exit 0
          fi

          # Check if CI is still running
          CI_ACTIVE=$(gh run list \
            --workflow=ci.yml \
            --commit="$COMMIT_SHA" \
            --json status \
            --jq '[.[] | select(.status != "completed")] | length' 2>/dev/null || echo "0")

          if [ "$CI_ACTIVE" -gt "0" ]; then
            echo "⏳ Build & Test is still running for $COMMIT_SHA"
            echo "Wait for CI to finish, then re-push the tag."
            exit 1
          fi

          if [ -z "$CI_RESULT" ]; then
            echo "❌ No CI run found for $COMMIT_SHA"
            echo "CI may have been skipped (docs-only change?) or hasn't triggered yet."
            echo "Push code to main and wait for Build & Test to pass before tagging."
            exit 1
          fi

          echo "❌ Build & Test conclusion: $CI_RESULT"
          echo "Fix CI failures before deploying."
          exit 1

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.api-changed == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Pull cache
        run: docker pull ${{ env.ACR_NAME }}.azurecr.io/api:latest || true

      - name: Build and push
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/api
          TAG=${{ needs.preflight.outputs.image-tag }}
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "$IMAGE:latest" \
            -f docker/Dockerfile.api \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/api:${{ needs.preflight.outputs.image-tag }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.web-changed == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Pull cache
        run: docker pull ${{ env.ACR_NAME }}.azurecr.io/web:latest || true

      - name: Build and push
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/web
          TAG=${{ needs.preflight.outputs.image-tag }}
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "$IMAGE:latest" \
            -f docker/Dockerfile.web \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

  build-admin:
    name: Build Admin
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.admin-changed == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Pull cache
        run: docker pull ${{ env.ACR_NAME }}.azurecr.io/admin:latest || true

      - name: Build and push
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/admin
          TAG=${{ needs.preflight.outputs.image-tag }}
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "$IMAGE:latest" \
            -f docker/Dockerfile.admin \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [preflight, build-api]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.api-changed == 'true' &&
      needs.build-api.result == 'success'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-notebookmd-api
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/api:${{ needs.preflight.outputs.image-tag }}

      - name: Verify API health
        run: |
          for i in {1..30}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://api.notebookmd.io/api/health || true)
            if [ "$status" = "200" ]; then
              echo "✅ API is healthy"
              exit 0
            fi
            echo "Waiting for API... (attempt $i, status: $status)"
            sleep 10
          done
          echo "❌ API health check failed after 5 minutes"
          exit 1

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [preflight, build-web]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.web-changed == 'true' &&
      needs.build-web.result == 'success'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Web
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-notebookmd-web
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/web:${{ needs.preflight.outputs.image-tag }}

  deploy-admin:
    name: Deploy Admin
    runs-on: ubuntu-latest
    needs: [preflight, build-admin]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.admin-changed == 'true' &&
      needs.build-admin.result == 'success'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Admin
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-notebookmd-admin
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/admin:${{ needs.preflight.outputs.image-tag }}

  summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [preflight, deploy-api, deploy-web, deploy-admin]
    if: always() && needs.preflight.result == 'success'
    steps:
      - name: Check for failures
        if: |
          needs.deploy-api.result == 'failure' ||
          needs.deploy-web.result == 'failure' ||
          needs.deploy-admin.result == 'failure'
        run: |
          echo "❌ One or more deploys failed"
          exit 1

      - name: Summary
        run: |
          echo "### Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Action |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.deploy-api.result }}" = "success" ]; then
            echo "| API | ✅ Deployed |" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.deploy-api.result }}" = "skipped" ]; then
            echo "| API | ⏭️ Unchanged |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| API | ❌ Failed |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ needs.deploy-web.result }}" = "success" ]; then
            echo "| Web | ✅ Deployed |" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.deploy-web.result }}" = "skipped" ]; then
            echo "| Web | ⏭️ Unchanged |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Web | ❌ Failed |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ needs.deploy-admin.result }}" = "success" ]; then
            echo "| Admin | ✅ Deployed |" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.deploy-admin.result }}" = "skipped" ]; then
            echo "| Admin | ⏭️ Unchanged |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Admin | ❌ Failed |" >> "$GITHUB_STEP_SUMMARY"
          fi
