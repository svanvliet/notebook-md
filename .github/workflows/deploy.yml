name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  ACR_NAME: crnotebookmdprod
  RESOURCE_GROUP: rg-notebookmd-prod

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push web
        run: |
          docker build -f docker/Dockerfile.web -t ${{ env.ACR_NAME }}.azurecr.io/web:${{ steps.meta.outputs.version }} .
          docker push ${{ env.ACR_NAME }}.azurecr.io/web:${{ steps.meta.outputs.version }}

      - name: Build and push api
        run: |
          docker build -f docker/Dockerfile.api -t ${{ env.ACR_NAME }}.azurecr.io/api:${{ steps.meta.outputs.version }} .
          docker push ${{ env.ACR_NAME }}.azurecr.io/api:${{ steps.meta.outputs.version }}

      - name: Build and push admin
        run: |
          docker build -f docker/Dockerfile.admin -t ${{ env.ACR_NAME }}.azurecr.io/admin:${{ steps.meta.outputs.version }} .
          docker push ${{ env.ACR_NAME }}.azurecr.io/admin:${{ steps.meta.outputs.version }}

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/api:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run database migrations
        run: |
          az containerapp job create \
            --name "migrate-${{ needs.build-and-push.outputs.image-tag }}" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment "cae-notebookmd-prod" \
            --image "${{ env.ACR_NAME }}.azurecr.io/api:${{ needs.build-and-push.outputs.image-tag }}" \
            --registry-server "${{ env.ACR_NAME }}.azurecr.io" \
            --registry-identity "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-notebookmd-prod" \
            --trigger-type Manual \
            --cpu 0.25 --memory 0.5Gi \
            --command "/bin/sh" "-c" "npx node-pg-migrate up --migrations-dir migrations --migration-file-language sql" \
            --env-vars "DATABASE_URL=secretref:database-url" \
            --secrets "database-url=keyvaultref:https://kv-notebookmd-prod.vault.azure.net/secrets/db-connection-string,identityref:/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-notebookmd-prod" \
            --replica-timeout 120 \
            --replica-retry-limit 0
          az containerapp job start \
            --name "migrate-${{ needs.build-and-push.outputs.image-tag }}" \
            --resource-group ${{ env.RESOURCE_GROUP }}
          echo "⏳ Waiting for migration job to complete..."
          for i in {1..24}; do
            status=$(az containerapp job execution list \
              --name "migrate-${{ needs.build-and-push.outputs.image-tag }}" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "[0].properties.status" -o tsv 2>/dev/null || echo "Running")
            if [ "$status" = "Succeeded" ]; then
              echo "✅ Migrations completed successfully"
              break
            elif [ "$status" = "Failed" ]; then
              echo "❌ Migration failed"
              exit 1
            fi
            echo "  Migration status: $status (attempt $i)"
            sleep 5
          done
          # Clean up the job
          az containerapp job delete \
            --name "migrate-${{ needs.build-and-push.outputs.image-tag }}" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null || true

      - name: Deploy API
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-notebookmd-api
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/api:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy Web
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-notebookmd-web
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/web:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy Admin
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-notebookmd-admin
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/admin:${{ needs.build-and-push.outputs.image-tag }}

      - name: Verify API health
        run: |
          for i in {1..30}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://api.notebookmd.io/api/health || true)
            if [ "$status" = "200" ]; then
              echo "✅ API is healthy"
              exit 0
            fi
            echo "Waiting for API... (attempt $i, status: $status)"
            sleep 10
          done
          echo "❌ API health check failed after 5 minutes"
          exit 1
