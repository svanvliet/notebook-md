name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-web:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -w @notebook-md/web

  test-api:
    name: API Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: notebookmd
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: notebookmd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U notebookmd -d notebookmd_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
    env:
      DATABASE_URL: postgresql://notebookmd:testpass@localhost:5432/notebookmd_test
      REDIS_URL: redis://localhost:6379
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SESSION_SECRET: ci-test-session-secret-not-for-production
      ENCRYPTION_KEY: ci-test-encryption-key-32ch
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -w @notebook-md/api

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-web, test-api]
    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: docker build -f docker/Dockerfile.web -t notebookmd-web:${{ github.sha }} .

      - name: Build api image
        run: docker build -f docker/Dockerfile.api -t notebookmd-api:${{ github.sha }} .

      - name: Build admin image
        run: docker build -f docker/Dockerfile.admin -t notebookmd-admin:${{ github.sha }} .

      - name: Scan images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: notebookmd-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Start production stack
        run: docker compose -f docker-compose.prod.yml up -d --build --wait

      - name: Run E2E smoke tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:8080

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
