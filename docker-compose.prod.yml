# Production-like local testing with built containers.
# Usage: docker compose -f docker-compose.prod.yml up --build
#
# Requires: .env file at repo root with all production env vars.
# This stack uses the same PostgreSQL/Redis/Mailpit as dev for local testing.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notebookmd
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: notebookmd
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notebookmd"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: npx node-pg-migrate up --migrations-dir migrations --migration-file-language sql
    environment:
      DATABASE_URL: postgresql://notebookmd:localdev@db:5432/notebookmd
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://notebookmd:localdev@db:5432/notebookmd
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      CORS_ORIGIN: http://localhost:8080
      ADMIN_ORIGIN: http://localhost:8081
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: ""
        VITE_ADMIN_URL: ""
        VITE_POSTHOG_KEY: ""
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      args:
        VITE_API_URL: ""
        VITE_APP_URL: ""
    ports:
      - "8081:80"
    depends_on:
      - api

  collab:
    build:
      context: .
      dockerfile: docker/Dockerfile.collab
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      NODE_ENV: production
      COLLAB_PORT: "3002"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: notebookmd
      DB_USER: notebookmd
      DB_PASSWORD: localdev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata_prod:
